name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version label for the artifact (e.g. 1.0.0-dev). Leave empty for a timestamp."
        required: false
        default: ""

permissions:
  contents: write   # needed to create a GitHub Release on tag push

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v', ''
          } elseif ('${{ github.event.inputs.version }}' -ne '') {
            $v = '${{ github.event.inputs.version }}'
          } else {
            $v = (Get-Date -Format 'yyyyMMdd-HHmmss')
          }
          "value=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Version = $v"

      - name: Publish (self-contained, single file, x64)
        shell: pwsh
        run: |
          dotnet publish PhantomFocus.csproj `
            -c Release `
            -r win-x64 `
            -p:Version=${{ steps.ver.outputs.value }} `
            -o publish

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v5
        with:
          name: PhantomFocus-${{ steps.ver.outputs.value }}-win-x64
          path: publish/PhantomFocus.exe
          if-no-files-found: error

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            "publish/PhantomFocus.exe" `
            --title "PhantomFocus ${{ steps.ver.outputs.value }}" `
            --generate-notes
